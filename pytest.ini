[pytest]
# `src/` on the path so pipeline modules import each other as they do when run
# as scripts (e.g. `from config import ...`). conftest.py adds it too, for
# editors/runners that ignore this file.
pythonpath = src
testpaths = tests
addopts = -q --color=yes
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
