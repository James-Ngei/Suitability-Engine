services:
  - type: web
    name: suitability-engine-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ping
    envVars:
      - key: SUITABILITY_DATA_DIR
        value: /tmp/suitability-engine
      - key: ACTIVE_COUNTY
        value: kitui
      - key: ACTIVE_CROP
        value: cotton
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: suitability-engine
      - key: PYTHONUNBUFFERED
        value: "1"